<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saraswati Library - Book</title>
    <link rel="icon" type="image/png" href="/static/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 20px;
    min-height: 100vh;
}    
.container {
    width: 95%;
    max-width: 1100px;
    margin: 20px auto;
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
    @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
} 
        /* --- HEADER & LOGO --- */
        .header-container {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #e0e6ed;
        }
.header-container h2 {
    margin: 0;
    font-size: 28px;
    color: #090909;
}
        /* --- STATS --- */
        .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
.stat-box {
    padding: 10px 20px;
    border-radius: 8px;
    background: #f8f9fa;
    border: 1px solid #667eea;
    font-weight: bold;
    min-width: 120px;
    text-align: center;
    color: #667eea;
}
        /* --- CONTROLS --- */
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #ccc; outline: none; font-size: 16px; transition: 0.3s; }
input:focus {
    border-color: #667eea;
    box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
}       
 #studentName { width: 30%; border: 2px solid #667eea; }
        #searchBox { width: 50%; border: 2px solid #1a73e8; }

        /* --- TABLE STYLING --- */
        .scroll-box { max-height: 500px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; background: white; } 
th {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    position: sticky;
    top: 0;
    padding: 15px;
    z-index: 10;
    text-align: center;
}        
td { border-bottom: 1px solid #eee; padding: 12px; text-align: center; word-wrap: break-word; }

        /* --- BUTTONS & LABELS --- */
        .action-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
        button { width: 110px; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-req {
    background: #667eea;
    color: white;
}
.btn-req:hover {
    background: #5560c1;
    transform: translateY(-2px);
}

.btn-ret {
    background: #e74c3c;
    color: white;
}
.btn-ret:hover {
    background: #c0392b;
    transform: translateY(-2px);
}
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .available { background: #e8f5e9; color: #2e7d32; }
        .requested { background: #fff3cd; color: #856404; }
        .issued { background: #ffebee; color: #c62828; }
        .waiting-text { font-size: 11px; color: #777; font-style: italic; }
    </style>
<script src="/static/js/config.js"></script>
</head>
<body>
<div class="container">
    <div class="header-container">
        <h2>Saraswati Library Management - Book List</h2>
    </div>
    
    <div class="stats">
        <div class="stat-box" id="totalCount">Total: 0</div>
        <div class="stat-box" style="color:green" id="availCount">Available: 0</div>
        <div class="stat-box" style="color:orange" id="reqCount">Requests: 0</div>
    </div>

    <div class="controls">
        <input type="text" id="studentName" placeholder="Enter Your Email to Request">
        <input type="text" id="searchBox" placeholder="Search book name or author..." onkeyup="displayBooks()">
    </div>

    <div class="scroll-box">
        <table id="booksTable">
            <thead>
                <tr>
    <th style="width: 8%;">ID</th>
    <th style="width: 30%;">Book Name</th>
    <th style="width: 20%;">Author</th>
    <th class="admin-col" style="width: 15%;">Holder</th>
    <th class="admin-col" style="width: 12%;">Issue Date</th>
    <th style="width: 15%;">Action</th>
</tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
// Check if user is admin
const isAdmin = localStorage.getItem("adminLoggedIn") === "true";

// Hide admin columns for non-admin users
if (!isAdmin) {
    document.querySelectorAll(".admin-col").forEach(col => {
        col.style.display = "none";
    });
}

// Auto-fill student name with logged-in email
const loggedInStudent = localStorage.getItem("currentStudent");
if (loggedInStudent) {
    document.getElementById("studentName").value = loggedInStudent;
}

let books = [];

// Fetch books from backend
async function fetchBooks() {
    try {
        const response = await fetch(`${API_URL}/books`);
        books = await response.json();
        displayBooks();
    } catch (error) {
        console.error("Error fetching books:", error);
    }
}

function displayBooks() {
    const search = document.getElementById("searchBox").value.toLowerCase();
    const student = document.getElementById("studentName").value.trim();
    const tbody = document.querySelector("#booksTable tbody");
    tbody.innerHTML = "";

    const filtered = books.filter(b => 
        b.name.toLowerCase().includes(search) || b.author.toLowerCase().includes(search)
    );

    filtered.forEach(book => {
        const row = tbody.insertRow();
        const isMyBook = (book.holder === student && student !== "");
        
        let actionHTML = "";
        
        if (book.status === "Available") {
            actionHTML = `<button class="btn-req" onclick="requestBook(${book.id})">Request</button>`;
        } else if (book.status === "Requested") {
            actionHTML = isMyBook ? `<span class="waiting-text">Waiting Approval...</span>` : `<span>-</span>`;
        } else if (book.status === "Issued") {
            actionHTML = isMyBook ? `<button class="btn-ret" onclick="returnBook(${book.id})">Return</button>` : `<span>-</span>`;
        }

        // Only show holder and issue date for admin
        const holderDisplay = isAdmin ? (book.holder || "-") : "-";
        const issueDateDisplay = isAdmin ? (book.issue_date || "N/A") : "-";

        row.innerHTML = `
            <td>${book.id}</td>
            <td style="text-align:left"><strong>${book.name}</strong></td>
            <td>${book.author}</td>
            <td class="admin-col">${holderDisplay}</td>
            <td class="admin-col">${issueDateDisplay}</td>
            <td>
                <div class="action-cell">
                    <span class="status-pill ${book.status.toLowerCase()}">${book.status}</span>
                    ${actionHTML}
                </div>
            </td>
        `;
    });
    updateStats();
}

async function requestBook(id) {
    if (localStorage.getItem("studentLoggedIn") !== "true") {
        alert("Please login first to request a book!");
        location.href = "/login";
        return;
    }
    
    const student = document.getElementById("studentName").value.trim();
    if (!student) {
        alert("Please enter your email first!");
        return;
    }
    
    try {
        const response = await fetch(`${API_URL}/request_book`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                bookId: id,
                requestedBy: student.toLowerCase()
            })
        });
        
        const data = await response.json();
        if (data.success) {
            alert("Request sent to Admin!");
            fetchBooks();
        } else {
            alert(data.message);
        }
    } catch (error) {
        alert("Error requesting book!");
    }
}

async function returnBook(id) {
    const student = document.getElementById("studentName").value.trim();
    
    try {
        const response = await fetch(`${API_URL}/return_book`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                bookId: id,
                email: student.toLowerCase()
            })
        });
        
        const data = await response.json();
        if (data.success) {
            alert("Book returned successfully!");
            fetchBooks();
        } else {
            alert(data.message);
        }
    } catch (error) {
        alert("Error returning book!");
    }
}

function updateStats() {
    const total = books.length;
    const avail = books.filter(b => b.status === "Available").length;
    const reqs = books.filter(b => b.status === "Requested").length;
    
    document.getElementById("totalCount").innerText = "Total: " + total;
    document.getElementById("availCount").innerText = "Available: " + avail;
    document.getElementById("reqCount").innerText = "Requests: " + reqs;
}

// Load books on page load
fetchBooks();

// Refresh every 5 seconds
setInterval(fetchBooks, 5000);
</script>
</body>
</html>
